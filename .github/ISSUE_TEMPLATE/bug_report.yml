name: Bug report
description: Report a reproducible problem
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open...\n2. Send...\n3. See..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version and macOS version
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Remove private conversations and session data before posting.
